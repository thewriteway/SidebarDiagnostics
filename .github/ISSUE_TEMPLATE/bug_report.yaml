name: Bug Report
description: Report a problem with Sidebar Diagnostics
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: Tell us what you see.
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: Describe how somebody else could observe the same behavior you do.
      placeholder: |
        1. Open Settings and enable ...
        2. Restart the app
        3. The sidebar ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App Version
      description: Shown in the changelog window and in the tray icon tooltip.
      placeholder: "3.7.6"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      description: Your Windows version and build.
      placeholder: "Windows 11 Pro 24H2 (build 26100)"
    validations:
      required: true
  - type: input
    id: hardware
    attributes:
      label: Hardware
      description: |
        Your CPU, GPU, and motherboard model — sensor issues are usually hardware-specific.
      placeholder: "Ryzen 7 5800X, RTX 3070, ASUS TUF B550-PLUS"
    validations:
      required: true
  - type: textarea
    id: settings
    attributes:
      label: Relevant settings
      description: Any non-default settings that might be related (monitor panels, hotkeys, screen setup, multi-monitor, DPI scaling, etc.).
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: |
        If the app crashed, paste the contents of `%LOCALAPPDATA%\SidebarDiagnostics\error.log` (or the error dialog text). This will be automatically formatted into code, so no need for backticks.
      render: console
    validations:
      required: false
